# Deploy to VPS when you push to main (or run manually).
# Requires: repo on GitHub, VPS with app already set up once (see STEPS.md Part B).
# Add in GitHub: Settings → Secrets and variables → Actions:
#   Variables: VPS_HOST, VPS_USER
#   Secret: VPS_SSH_KEY (private key for SSH; use Secrets so newlines are preserved)

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            git config --global --add safe.directory /home/divsketch-cv/htdocs
            cd /home/divsketch-cv/htdocs
            git pull origin main
            npm ci
            npm run build
            cp -r frontend/dist/* cv.divsketch.com/
            cd backend && npx prisma generate && npx prisma migrate deploy && cd ..
            pm2 restart probashicv || pm2 start ecosystem.config.cjs
            pm2 save
            pm2 status
